name: Validate Release Matrix

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-compiled:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target_os: linux
            target_arch: x86_64
            artifact_name: compiled-linux-x86_64
          - runner: macos-14
            target_os: macos
            target_arch: arm64
            artifact_name: compiled-macos-arm64
          - runner: windows-latest
            target_os: windows
            target_arch: x86_64
            artifact_name: compiled-windows-x86_64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      PYTHON_BIN: python
      ARCHITEC_TARGET_OS: ${{ matrix.target_os }}
      ARCHITEC_TARGET_ARCH: ${{ matrix.target_arch }}
      ARCHITEC_SOURCE_DIR: ${{ github.workspace }}/architec
      ARCHITEC_LLMGATEWAY_SRC: ${{ github.workspace }}/llmgateway/src
    steps:
      - name: Checkout release tooling
        uses: actions/checkout@v4
        with:
          path: release-control

      - name: Checkout architec
        uses: actions/checkout@v4
        with:
          repository: bfly123/architec
          path: architec
          ssh-key: ${{ secrets.ARCHITEC_REPO_SSH_KEY }}

      - name: Checkout llmgateway
        uses: actions/checkout@v4
        with:
          repository: bfly123/llmgateway
          path: llmgateway

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging dependencies
        working-directory: release-control
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install nuitka ordered-set zstandard PyYAML cryptography

      - name: Install Linux build prerequisites
        if: matrix.target_os == 'linux'
        working-directory: release-control
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Build compiled artifact
        working-directory: release-control
        run: bash tools/build_nuitka.sh

      - name: Verify compiled artifact starts
        working-directory: release-control
        run: |
          archive_path="release-assets/archi-${{ matrix.target_os }}-${{ matrix.target_arch }}"
          if [[ "${{ matrix.target_os }}" == "windows" ]]; then
            archive_path="${archive_path}.zip"
          else
            archive_path="${archive_path}.tar.gz"
          fi
          python tools/verify_compiled_bundle.py "${archive_path}"

      - name: Upload compiled artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release-control/release-assets/archi-${{ matrix.target_os }}-${{ matrix.target_arch }}.tar.gz
            release-control/release-assets/archi-${{ matrix.target_os }}-${{ matrix.target_arch }}.zip
          if-no-files-found: error
