name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  build-compiled:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target_os: linux
            target_arch: x86_64
            artifact_name: compiled-linux-x86_64
          - runner: macos-14
            target_os: macos
            target_arch: arm64
            artifact_name: compiled-macos-arm64
          - runner: windows-latest
            target_os: windows
            target_arch: x86_64
            artifact_name: compiled-windows-x86_64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      PYTHON_BIN: python
      ARCHITEC_TARGET_OS: ${{ matrix.target_os }}
      ARCHITEC_TARGET_ARCH: ${{ matrix.target_arch }}
      ARCHITEC_SOURCE_DIR: ${{ github.workspace }}/architec
      ARCHITEC_LLMGATEWAY_SRC: ${{ github.workspace }}/llmgateway/src
    steps:
      - name: Checkout release tooling
        uses: actions/checkout@v4
        with:
          path: release-control

      - name: Checkout architec
        uses: actions/checkout@v4
        with:
          repository: bfly123/architec
          path: architec
          token: ${{ secrets.ARCHITEC_RELEASES_TOKEN }}

      - name: Checkout llmgateway
        uses: actions/checkout@v4
        with:
          repository: bfly123/llmgateway
          path: llmgateway
          token: ${{ secrets.ARCHITEC_RELEASES_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging dependencies
        working-directory: release-control
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install nuitka ordered-set zstandard

      - name: Install Linux build prerequisites
        if: matrix.target_os == 'linux'
        working-directory: release-control
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Build compiled artifact
        working-directory: release-control
        run: bash tools/build_nuitka.sh

      - name: Verify Linux compiled artifact starts
        if: matrix.target_os == 'linux'
        working-directory: release-control
        run: |
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT
          tar -xzf "release-assets/archi-${{ matrix.target_os }}-${{ matrix.target_arch }}.tar.gz" -C "${tmp_dir}"
          binary_path="$(find "${tmp_dir}" -type f -name archi | head -n 1)"
          if [[ -z "${binary_path}" ]]; then
            echo "Compiled archi binary not found after extraction." >&2
            exit 1
          fi
          "${binary_path}" status --json > "${tmp_dir}/status.json"
          python - "${tmp_dir}/status.json" <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], "r", encoding="utf-8"))
          if payload.get("authenticated") is not False:
              raise SystemExit(f"unexpected startup status payload: {payload}")
          PY

      - name: Upload compiled artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release-control/release-assets/archi-${{ matrix.target_os }}-${{ matrix.target_arch }}.tar.gz
            release-control/release-assets/archi-${{ matrix.target_os }}-${{ matrix.target_arch }}.zip
          if-no-files-found: error

  publish:
    needs: build-compiled
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      ARCHITEC_RELEASE_REPO: bfly123/architec-releases
      PYTHON_BIN: python
      ARCHITEC_VERSION_TAG: ${{ github.event.inputs.version_tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.ARCHITEC_RELEASES_TOKEN }}
    steps:
      - name: Validate token secret
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "ARCHITEC_RELEASES_TOKEN is required to publish into ${ARCHITEC_RELEASE_REPO}" >&2
            exit 1
          fi

      - name: Checkout architec
        uses: actions/checkout@v4
        with:
          path: release-control

      - name: Checkout architec source
        uses: actions/checkout@v4
        with:
          repository: bfly123/architec
          path: architec
          token: ${{ secrets.ARCHITEC_RELEASES_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download compiled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: compiled-*
          path: release-control/release-assets
          merge-multiple: true

      - name: Install packaging dependencies
        working-directory: release-control
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Publish release artifacts
        working-directory: release-control
        env:
          ARCHITEC_RELEASE_PREBUILT_ARTIFACTS: "1"
          ARCHITEC_SOURCE_DIR: ${{ github.workspace }}/architec
        run: bash tools/publish_release.sh
